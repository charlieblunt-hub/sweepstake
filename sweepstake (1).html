<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⛳ Valero 2026 Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#00c853;--gold:#ffd600;--silver:#b0bec5;--bronze:#ff7043;--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--card:#161d2e;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7a99;--red:#ff4444;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,200,83,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding-bottom:40px;}
  header{background:linear-gradient(180deg,#0d1520 0%,var(--bg) 100%);padding:20px 16px 12px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
  .tour-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:3px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,8vw,40px);letter-spacing:2px;line-height:1;color:#fff;margin-bottom:5px;}
  h1 span{color:var(--green);}
  .purse{display:inline-flex;align-items:center;gap:5px;background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px;}
  .stbar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.4)}}
  .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:107px;z-index:99;}
  .tab{flex:1;padding:11px 8px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
  .tab.on{color:var(--green);border-bottom-color:var(--green);}
  .sec{display:none;padding:14px;}
  .sec.on{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;overflow:hidden;animation:slideUp 0.35s ease both;}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.15s}
  .card.r1{border-color:rgba(255,214,0,0.4);background:linear-gradient(135deg,#1a1600 0%,var(--card) 40%);}
  .card.r2{border-color:rgba(176,190,197,0.25);}
  .card.r3{border-color:rgba(255,112,67,0.25);}
  .ctop{display:flex;align-items:center;padding:13px 15px;gap:11px;cursor:pointer;}
  .mring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .mring.gold{background:rgba(255,214,0,0.15);border:2px solid rgba(255,214,0,0.4);}
  .mring.silver{background:rgba(176,190,197,0.1);border:2px solid rgba(176,190,197,0.3);}
  .mring.bronze{background:rgba(255,112,67,0.1);border:2px solid rgba(255,112,67,0.3);}
  .mring.other{background:rgba(255,255,255,0.04);border:2px solid var(--border);font-family:'Bebas Neue';font-size:14px;color:var(--muted);}
  .cinfo{flex:1;min-width:0;}
  .cname{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
  .r1 .cname{color:var(--gold);}
  .csub{font-size:11px;color:var(--muted);margin-top:1px;font-family:'Barlow Condensed',sans-serif;}
  .ctotal{text-align:right;}
  .camount{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;color:var(--green);line-height:1;}
  .r1 .camount{color:var(--gold);font-size:24px;}
  .clabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;}
  .chev{color:var(--muted);font-size:14px;transition:transform 0.2s;margin-left:3px;}
  .card.open .chev{transform:rotate(180deg);}
  .gbar{height:3px;background:var(--bg3);margin:0 15px 10px;}
  .gfill{height:100%;background:linear-gradient(90deg,var(--green),#69f0ae);transition:width .7s ease;}
  .prows{display:none;padding:0 15px 13px;gap:5px;flex-direction:column;}
  .card.open .prows{display:flex;}
  .prow{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:8px;padding:7px 11px;gap:8px;}
  .pleft{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .ppos{font-family:'Bebas Neue',sans-serif;font-size:15px;min-width:30px;text-align:center;color:var(--green);}
  .ppos.cut{color:var(--red);font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
  .ppos.unk{color:var(--muted);}
  .pname{font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#cdd5e0;}
  .pscore{font-size:11px;color:var(--muted);}
  .pscore.neg{color:var(--green);}
  .pscore.pos{color:var(--red);}
  .pprize{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;}
  .pprize.z{color:var(--muted);}
  .lbwrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .lbhdr{display:grid;grid-template-columns:40px 1fr 50px 42px 88px;padding:7px 11px;font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
  .lbrow{display:grid;grid-template-columns:40px 1fr 50px 42px 88px;padding:8px 11px;font-size:12px;align-items:center;border-bottom:1px solid var(--border);}
  .lbrow.pk{background:rgba(0,200,83,0.05);}
  .lbpos{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);text-align:center;}
  .lbname{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .lbowner{font-size:10px;color:var(--muted);}
  .lbsc{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;}
  .lbsc.neg{color:var(--green);}
  .lbsc.pos{color:var(--red);}
  .lbth{text-align:center;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
  .lbpr{text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--green);font-weight:600;}
  .lbpr.z{color:var(--muted);}
  .seclbl{padding:8px 11px 5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;color:var(--muted);text-transform:uppercase;background:var(--bg2);}
  .loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;font-size:13px;text-transform:uppercase;}
  .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{text-align:center;padding:40px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);line-height:1.8;}
  .err a{color:var(--green);}
  footer{text-align:center;padding:16px;font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border);margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tour-label">⛳ 2026 PGA Tour · TPC San Antonio</div>
    <h1>VALERO <span>SWEEPSTAKE</span></h1>
    <div class="purse">💰 $9,800,000 Purse</div>
    <div class="stbar"><span class="dot"></span><span id="stxt">Loading live scores...</span></div>
  </header>
  <div class="tabs">
    <div class="tab on" onclick="show('st')">🏆 Standings</div>
    <div class="tab" onclick="show('lb')">📊 Leaderboard</div>
  </div>
  <div id="st" class="sec on"><div class="loading"><div class="spin"></div>Fetching scores...</div></div>
  <div id="lb" class="sec"><div class="loading"><div class="spin"></div>Fetching leaderboard...</div></div>
  <footer id="foot">Auto-refreshes every 5 minutes</footer>
</div>
<script>
// ── REPLACE THIS URL WITH YOUR PUBLISHED GOOGLE SHEET CSV URL ──
// Instructions: File > Share > Publish to web > Sheet: Leaderboard > CSV > Publish > Copy link
const DATA_URL = "https://script.google.com/macros/s/AKfycbz2uRDiYoPB7J_2UuAxePyf4WtNkJ_bloJlznjFAZXJ613bWaXaTj9a59tbY6RFVi4n/exec";

const PICKS={
  "Joe Blunt":["Tommy Fleetwood","Tony Finau","Russell Henley","Jordan Spieth","Ludvig Aberg"],
  "Stephen Mills":["Mark Hubbard","Davis Thompson","Will Zalatoris","Brian Harman","Rickie Fowler"],
  "Andrew Docwra":["Robert MacIntyre","Sam Ryder","Andrew Putnam","Nick Taylor","Maverick McNealy"],
  "Linden Grubb":["Steven Fisk","JJ Spaun","Denny McCarthy","Doc Redman","Adam Schenk"],
  "Charlie Blunt":["Christiaan Lamprecht","Kevin Streelman","Sahith Theegala","Taylor Moore","Harris English"],
  "Matt Harding-Smith":["Wyndham Clark","Sepp Straka","Keith Mitchell","Beau Hossler","Dylan Wu"],
  "Mario Zakakiotis":["Cameron Young","Ben Griffin","Austin Smotherman","Patrick Rodgers","Tom Hoge"],
  "Dom Hunt":["Akshay Bhatia","Ryan Brehm","Luke Clanton","Chris Gotterup","Alex Smalley"],
  "Tommy North":["Peter Malnati","Justin Lower","Michael Kim","Scott Stallings","James Hahn"],
  "Max Maciver":["Aaron Rai","Ben Taylor","Brendon Todd","Matt Kuchar","Stephan Jaeger"]
};

const PM={1:1764000,2:1068200,3:676200,4:480200,5:401800,6:355250,7:330750,8:306250,9:286650,10:267050,11:247450,12:227850,13:208250,14:188650,15:178850,16:169050,17:159250,18:149450,19:139650,20:129850,21:120050,22:110250,23:102410,24:94570,25:86730,26:78890,27:75950,28:73010,29:70070,30:67130,31:64190,32:61250,33:58310,34:55860,35:53410,36:50960,37:48510,38:46550,39:44590,40:42630,41:40670,42:38710,43:36750,44:34790,45:32830,46:30870,47:28910,48:27342,49:25970,50:25186,51:24598,52:24010,53:23618,54:23226,55:23030,56:22834,57:22638,58:22442,59:22246,60:22050,61:21854,62:21658,63:21462,64:21266,65:21070};

const p2p={};
Object.entries(PICKS).forEach(([per,pks])=>pks.forEach(n=>{p2p[n.toLowerCase()]=per;}));

let players=[];

function show(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['st','lb'][i]===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on',s.id===id));
}
function fmt(n){return n?'$'+n.toLocaleString('en-GB'):'$0';}
function sc(s){if(!s||s==='E')return '';if(String(s).startsWith('-'))return 'neg';return 'pos';}
function find(name){
  const lo=name.toLowerCase();
  let m=players.find(p=>p.name.toLowerCase()===lo);
  if(!m){const last=lo.split(' ').pop();m=players.find(p=>p.name.toLowerCase().endsWith(last));}
  return m||null;
}

function calcPrizes(players){
  // Group players by position to handle ties correctly
  const groups={};
  players.forEach(p=>{
    if(p.pos>=999)return;
    if(!groups[p.pos])groups[p.pos]=[];
    groups[p.pos].push(p);
  });
  // For each tied group, average the prize money across all tied positions
  // e.g. 4 players tied 2nd: average prize money for 2nd+3rd+4th+5th, split equally
  Object.entries(groups).forEach(([pos,group])=>{
    pos=parseInt(pos);
    if(pos>65){group.forEach(p=>p.prize=0);return;}
    const count=group.length;
    let total=0;
    for(let i=0;i<count;i++){
      total+=PM[pos+i]||0;
    }
    const avg=Math.round(total/count);
    group.forEach(p=>p.prize=avg);
  });
}

function parseCSV(csv){
  const lines=csv.trim().split('\n');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<5||!cols[2])continue;
    const pos=parseInt(cols[0])||999;
    rows.push({pos,posDisplay:cols[1]||String(pos),name:cols[2],score:cols[3]||'E',thru:cols[4]||'-',prize:0});
  }
  rows.sort((a,b)=>a.pos-b.pos);
  calcPrizes(rows);
  return rows;
}

async function loadData(){
  try{
    const url=DATA_URL+'?t='+Date.now();
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const json=await resp.json();
    if(!json.length)throw new Error('No data');
    players=json.map(r=>({
      pos:parseInt(r.pos)||999,
      posDisplay:r.posDisplay||String(r.pos),
      name:r.name,
      score:r.score||'E',
      thru:r.thru||'-',
      prize:0
    })).sort((a,b)=>a.pos-b.pos);
    calcPrizes(players);
    if(!players.length)throw new Error('No data');
    const now=new Date();
    document.getElementById('stxt').textContent='Live · Updated '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('foot').textContent='Last updated: '+now.toLocaleString('en-GB')+' · Auto-refreshes every 5 mins';
    render();
  }catch(e){
    console.error(e);
    document.getElementById('st').innerHTML=`<div class="err">⚠️ Could not load data from Google Sheet.<br><br>Make sure you've published the sheet as CSV and pasted the correct URL into the website file.<br><br><a href="#" onclick="loadData();return false;">Try again</a></div>`;
    document.getElementById('stxt').textContent='Error loading data';
  }
}

function showSetupMsg(){
  const msg=`<div class="err">
    ⚙️ <strong>One more step!</strong><br><br>
    Open this HTML file and replace:<br>
    <code style="color:var(--green);font-size:11px">PASTE_YOUR_SHEET_CSV_URL_HERE</code><br><br>
    with your Google Sheet publish URL.<br><br>
    See the instructions file for help.
  </div>`;
  document.getElementById('st').innerHTML=msg;
  document.getElementById('stxt').textContent='Setup needed';
}

function render(){
  renderSt();
  renderLb();
}

function renderSt(){
  const res=Object.entries(PICKS).map(([per,pks])=>{
    let tot=0;
    const dets=pks.map(name=>{
      const d=find(name);
      const prize=d?d.prize:0;
      tot+=prize;
      return {name,prize,pos:d?d.posDisplay:'?',score:d?d.score:'-',found:!!d};
    });
    return {per,dets,tot};
  }).sort((a,b)=>b.tot-a.tot);

  const top=res[0]?.tot||1;
  const mc=['gold','silver','bronze'];
  const me=['🥇','🥈','🥉'];

  let html='<button style="display:block;width:100%;margin-bottom:12px;padding:11px;background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.25);border-radius:10px;color:var(--green);font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-align:center;" onclick="loadData()">🔄 Refresh Scores</button>';
  res.forEach((r,i)=>{
    const gap=i>0?res[0].tot-r.tot:0;
    const gs=gap>0?'$'+gap.toLocaleString('en-GB')+' behind':'🔥 Leading';
    const pct=Math.round((r.tot/top)*100);
    const mrc=i<3?mc[i]:'other';
    const mrv=i<3?me[i]:(i+1);

    const prs=r.dets.map(d=>{
      const isCut=d.found&&d.prize===0&&d.pos!=='?';
      const pc=!d.found?'unk':(isCut?'cut':'');
      return `<div class="prow"><div class="pleft"><span class="ppos ${pc}">${d.pos}</span><span class="pname">${d.name}</span><span class="pscore ${sc(d.score)}">${d.score!=='-'?d.score:''}</span></div><span class="pprize ${d.prize===0?'z':''}">${fmt(d.prize)}</span></div>`;
    }).join('');

    html+=`<div class="card ${i===0?'r1':i===1?'r2':i===2?'r3':''}" id="c${i}">
      <div class="ctop" onclick="tog(${i})">
        <div class="mring ${mrc}">${mrv}</div>
        <div class="cinfo"><div class="cname">${r.per}</div><div class="csub">${gs} · tap to see picks</div></div>
        <div class="ctotal"><div class="camount">${fmt(r.tot)}</div><div class="clabel">projected</div></div>
        <span class="chev">▾</span>
      </div>
      <div class="gbar"><div class="gfill" style="width:${pct}%"></div></div>
      <div class="prows">${prs}</div>
    </div>`;
  });
  document.getElementById('st').innerHTML=html;
}

function renderLb(){
  if(!players.length)return;
  const picked=players.filter(p=>p2p[p.name.toLowerCase()]);
  const rest=players.filter(p=>!p2p[p.name.toLowerCase()]);
  let html=`<div class="lbwrap"><div class="lbhdr"><span style="text-align:center">Pos</span><span>Player</span><span style="text-align:center">Score</span><span style="text-align:center">Thru</span><span style="text-align:right">Prize</span></div>`;
  html+=`<div class="seclbl">⭐ Your sweepstake players</div>`;
  picked.forEach(p=>{html+=lbr(p,true);});
  html+=`<div class="seclbl">Full field</div>`;
  rest.slice(0,65).forEach(p=>{html+=lbr(p,false);});
  html+=`</div>`;
  document.getElementById('lb').innerHTML=html;
}

function lbr(p,pk){
  const own=p2p[p.name.toLowerCase()];
  const pr=p.prize>0?fmt(p.prize):(p.pos>65?'CUT':'-');
  return `<div class="lbrow ${pk?'pk':''}"><span class="lbpos">${p.posDisplay}</span><span class="lbname">${p.name}${pk&&own?`<div class="lbowner">${own}</div>`:''}</span><span class="lbsc ${sc(p.score)}">${p.score}</span><span class="lbth">${p.thru}</span><span class="lbpr ${p.prize===0?'z':''}">${pr}</span></div>`;
}

function tog(i){document.getElementById('c'+i).classList.toggle('open');}

loadData();
setInterval(loadData, 60000); // refresh every 1 min
</script>
</body>
</html>
